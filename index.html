<!DOCTYPE html>
<html>
<head>
  <title>Tilt to Select Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      font-family: Arial;
      text-align: center;
    }

    #enableBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      z-index: 10;
    }

    .button {
      position: absolute;
      width: 80px;
      height: 80px;
      background: lightgray;
      border-radius: 10px;
      line-height: 80px;
      font-weight: bold;
      transform: translate(-50%, -50%);
    }

    .highlight {
      background: orange;
    }

    #cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<button id="enableBtn">Enable Motion</button>

<div id="cursor"></div>

<!-- Buttons -->
<div class="button" style="left: 20%; top: 30%;">1</div>
<div class="button" style="left: 60%; top: 30%;">2</div>
<div class="button" style="left: 20%; top: 60%;">3</div>
<div class="button" style="left: 60%; top: 60%;">4</div>
<div class="button" style="left: 40%; top: 45%;">5</div>

<script>
let cursor = document.getElementById("cursor");
let buttons = document.querySelectorAll(".button");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

let selectedButton = null;
let isSelecting = false;

// Initial cursor position
cursor.style.left = x + "px";
cursor.style.top = y + "px";

// Enable motion
document.getElementById("enableBtn").onclick = function () {
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    DeviceMotionEvent.requestPermission().then(response => {
      if (response === "granted") {
        startMotion();
      }
    });
  } else {
    startMotion();
  }
};

function startMotion() {
  window.addEventListener("deviceorientation", handleTilt);
  window.addEventListener("devicemotion", handleShake);
}

// Tilt control
function handleTilt(event) {
  let gamma = event.gamma || 0;
  let beta = event.beta || 0;

  // Reduced sensitivity for better control
  x += gamma * 0.1;
  y += beta * 0.1;

  // Clamp to screen
  x = Math.max(0, Math.min(window.innerWidth, x));
  y = Math.max(0, Math.min(window.innerHeight, y));

  cursor.style.left = x + "px";
  cursor.style.top = y + "px";

  detectHover();
}

// Detect hovered button
function detectHover() {
  if (isSelecting) return;

  selectedButton = null;

  buttons.forEach(btn => {
    btn.classList.remove("highlight");

    let rect = btn.getBoundingClientRect();

    if (
      x > rect.left &&
      x < rect.right &&
      y > rect.top &&
      y < rect.bottom
    ) {
      btn.classList.add("highlight");
      selectedButton = btn;
    }
  });
}

// Shake detection
let lastShake = 0;

function handleShake(event) {
  let acc = event.accelerationIncludingGravity;
  if (!acc) return;

  let magnitude = Math.sqrt(
    (acc.x || 0) * (acc.x || 0) +
    (acc.y || 0) * (acc.y || 0) +
    (acc.z || 0) * (acc.z || 0)
  );

  let now = Date.now();

  if (magnitude > 25 && now - lastShake > 1000) {
    lastShake = now;
    confirmSelection();
  }
}

// Confirm selection
function confirmSelection() {
  if (selectedButton) {
    isSelecting = true;

    selectedButton.style.background = "green";

    setTimeout(() => {
      selectedButton.style.background = "lightgray";
      isSelecting = false;
    }, 500);
  }
}
</script>

</body>
</html>
